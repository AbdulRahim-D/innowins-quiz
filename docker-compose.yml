version: '3.8'

services:
  mongodb:
    image: mongo:6.0-jammy
    restart: always
    environment:
      MONGO_INITDB_DATABASE: platform
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  mongodb_data:
  redis_data:

